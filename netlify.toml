# Netlify config — hosts BOTH the static slideshow and the CORS helper.
#
# The site (index.html, app.js, callback.html, …) is served straight from the
# repo root. The function in netlify/functions/proxy.mjs handles two paths
# (bound via `export const config` inside it):
#   POST /token              and   GET /api/v1/oauth2/*
# Because the app and the function now share one origin, those API/token calls
# are same-origin — the proxy still re-emits DeviantArt's responses, it just no
# longer needs cross-origin CORS for the app itself.
#
# Deploy: connect this repo in the Netlify dashboard (no build command needed),
# or run `npx netlify deploy --prod` from the repo root.

[build]
  publish = "."
  functions = "netlify/functions"

# If you package this as a native app store listing (PWABuilder, Bubblewrap),
# those tools fetch the manifest and icons cross-origin from their own domain
# to inspect pixel dimensions and maskable safe zones. Without CORS headers
# that fetch is blocked even though the files are publicly reachable — these
# are public, non-sensitive static assets, so an open Access-Control-Allow-Origin
# is safe here.
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/icon*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

# Set your site's origin so the proxy only answers calls from your own app.
# (Prefer setting ALLOWED_ORIGINS in the Netlify dashboard env vars instead.)
# [build.environment]
#   ALLOWED_ORIGINS = "https://your-site.netlify.app,http://localhost:8000"
